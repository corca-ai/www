name: Apply Blog Admin Post Change

on:
  repository_dispatch:
    types:
      - admin-post-change

permissions:
  contents: write
  actions: write
  pull-requests: write

concurrency:
  group: admin-post-change
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CONTENT_CHANGE_TOKEN || github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Apply admin post change
        run: node scripts/apply-admin-post-change.js
        env:
          ADMIN_POST_CHANGE: ${{ toJson(github.event.client_payload) }}

      - name: Check generated admin post files
        run: node scripts/admin-post-change-check.js

      - name: Create admin post change pull request
        id: commit_posts
        env:
          GH_TOKEN: ${{ secrets.CONTENT_CHANGE_TOKEN || github.token }}
        run: |
          if [ -z "$(git status --porcelain -- public/blog public/en/blog public/ja/blog public/zh/blog)" ]; then
            echo "No admin post changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          branch="blog-admin-change/${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -A public/blog public/en/blog public/ja/blog public/zh/blog
          git commit -m "content: apply blog admin post change"
          git push --set-upstream origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "content: apply blog admin post change" \
            --body "Created from a /blog/admin post change request. Merge this PR to publish the generated static blog files through the normal main-branch deployment flow."
          echo "changed=true" >> "$GITHUB_OUTPUT"
