name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  # Core gates — Biome, astro check, build.
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Biome
        run: pnpm check:biome
      - name: Astro type check
        run: pnpm check:astro
      - name: Dead code + unused deps (knip)
        run: pnpm check:knip
      - name: Build
        run: pnpm build
      - name: Agentic discovery + accessibility contract
        run: pnpm check:agentic

  # Duplication (nose) + docs (awiki) gates. Both are public corca-ai tools;
  # installed here from their public release binaries — no token needed.
  duplication-and-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install nose + awiki
        env:
          GH_TOKEN: ${{ github.token }}
          NOSE_VERSION: v0.17.0
          AWIKI_VERSION: v0.5.0
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          dl() { # repo tag binname
            gh release download "$2" --repo "$1" \
              --pattern '*x86_64-unknown-linux-gnu.tar.xz' --dir "/tmp/$3" --clobber
            tar -xf /tmp/"$3"/*.tar.xz -C "/tmp/$3"
            install -m755 "$(find "/tmp/$3" -type f -name "$3" | head -1)" "$HOME/.local/bin/$3"
          }
          dl corca-ai/nose  "$NOSE_VERSION"  nose
          dl corca-ai/awiki "$AWIKI_VERSION" awiki
          nose --version
          awiki version
      - name: Duplication gate (nose)
        run: pnpm check:dup
      - name: Docs gate (awiki)
        run: pnpm check:docs
